version: '3.8'
services:
  app:
    build: .
    container_name: estudio-${DOMAIN:-localhost}
    restart: unless-stopped
    env_file: .env
    ports:
      - "${PORT:-3001}:3000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
